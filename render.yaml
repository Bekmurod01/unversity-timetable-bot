services:
  - type: redis
    name: university-timetable-redis
    plan: free
    maxmemoryPolicy: noeviction

  - type: web
    name: university-timetable-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: university-timetable-redis
          property: connectionString
