services:
  - type: redis
    name: university-timetable-redis
    plan: free
    maxmemoryPolicy: noeviction

  - type: worker
    name: university-timetable-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -u -m app.bot.main
    autoDeploy: true
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: university-timetable-redis
          property: connectionString
